
[root]
authors = ["Shreyas Khandekar"]
chplVersion = "2.9.0..2.9.0"
compopts = ["-M../../src"]
copyrightYear = "2026"
dependencies = ["Parquet -1 https://github.com/e-kayrakli/Parquet"]
license = "Apache-2.0"
name = "FastOTF2Converter"
source = "https://github.com/hpc-ai-adv-dev/fastotf2"
type = "application"
version = "0.1.0"

[Parquet]
chplVersion = "2.9.0..2.9.0"
name = "Parquet"
rev = "cfa584adf55462ed7bb148d9b93ab656565006f6"
source = "https://github.com/e-kayrakli/Parquet"
version = "-1"

[Parquet.system]

[Parquet.system.arrow]
include = "/opt/arrow/include"
libs = "-L/opt/arrow/lib -larrow"
name = "arrow"
version = "19.0.1"

[Parquet.system.parquet]
include = "/opt/arrow/include"
libs = "-L/opt/arrow/lib -lparquet -larrow"
name = "parquet"
version = "19.0.1"

[system]

[system.otf2]
includes = "-I/opt/otf2/include"
libs = "-L/opt/otf2/lib -lotf2"
name = "otf2"
version = "3.1.1"


